  No candidate data was shared with external LLM APIs during the ranking phase itself;
  LLM reasoning is a post-ranking enhancement step run offline before submission.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase CPU-only ranking pipeline. Phase 1 (offline, no time limit): extract
  a feature matrix from all 100K candidates using TF-IDF cosine similarity (sklearn),
  hard JD keyword matching, career quality signals, behavioral signals, location fit,
  availability, and explicit honeypot detection rules. Phase 2 (<5 min CPU):
  weighted linear combination of normalized features (skill_match 40%, career_quality
  25%, behavioral 20%, availability 10%, location 5%) with honeypot cap at 0.05.

  Post-ranking: reasoning_generator.py calls Groq-hosted Llama 3.3 70B to generate
  natural, recruiter-quality hiring arguments for each of the top 100 candidates,
  replacing template-based reasoning with specific career and skill references.

  Key design choices:
  - Proficiency-weighted skill matching (expert x3, advanced x2) prevents naive
    keyword-count inflation
  - Career quality score distinguishes product-company AI careers from consulting-firm
    keyword stuffers
  - Honeypot detection: 5 explicit rules (impossible tenure, expert/zero-duration,
    non-tech title + AI skills, all-expert skills, too-many-skills/low-YoE)
  - No LLM calls at inference time, ensuring <5 min CPU reproducibility
  - LLM reasoning is an offline post-ranking step (100 API calls, ~3 minutes)

